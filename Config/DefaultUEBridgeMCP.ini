[/Script/UEBridgeMCPEditor.McpServerSettings]
; HTTP server port for MCP connections
; Default: 8080
ServerPort=8080

; Auto-start the MCP server when the editor opens
; Default: true
bAutoStartServer=true

; Bind address for HTTP server
; Default: 127.0.0.1 (localhost only for security)
; Use 0.0.0.0 to allow external connections (not recommended)
BindAddress=127.0.0.1

; Log level for MCP server
; Options: Error, Warning, Log, Verbose, VeryVerbose
; Default: Log
LogLevel=Log
